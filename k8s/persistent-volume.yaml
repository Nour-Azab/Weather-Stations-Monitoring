# ── PersistentVolume (hostPath – works with minikube / Docker Desktop) ────────
# Shared storage for Parquet files and BitCask segments written by central-station.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: central-data-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /tmp/weather-data # minikube maps this to the node's /tmp
  persistentVolumeReclaimPolicy: Retain

---
# ── PersistentVolumeClaim (claimed by central-station pod) ───────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: central-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

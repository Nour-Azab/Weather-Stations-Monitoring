# ── PersistentVolume (hostPath – works with minikube / Docker Desktop) ────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: central-data-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  hostPath:
    path: /data/weather-data    # ← changed from /tmp/weather-data
  persistentVolumeReclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: central-data-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: ""    # must be empty for hostPath PVs
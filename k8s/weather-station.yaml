# ── Headless Service (gives each pod a stable DNS name) ──────────────────────
apiVersion: v1
kind: Service
metadata:
  name: weather-station
  labels:
    app: weather-station
spec:
  clusterIP: None
  selector:
    app: weather-station

---
# ── Weather Station StatefulSet (10 replicas) ─────────────────────────────────
# StatefulSet gives each pod a stable ordinal index (0-9) via HOSTNAME.
# pod weather-station-0 → STATION_ID=1, weather-station-9 → STATION_ID=10
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: weather-station
spec:
  replicas: 10
  serviceName: weather-station
  selector:
    matchLabels:
      app: weather-station
  template:
    metadata:
      labels:
        app: weather-station
    spec:
      # Wait for Kafka before any station starts sending
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka 9092; do
                echo "Waiting for Kafka..."
                sleep 2
              done
              echo "Kafka is up."

      containers:
        - name: weather-station
          image: weather-station:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BROKER
              value: kafka:9092
            - name: KAFKA_TOPIC
              value: weather-readings
            # Derive STATION_ID from the pod's ordinal (weather-station-0 → id=1)
            - name: STATION_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name # e.g. "weather-station-3"
          # Override STATION_ID with the numeric ordinal + 1
          command:
            - sh
            - -c
            - |
              export STATION_ID=$(( ${HOSTNAME##*-} + 1 ))
              echo "Starting station $STATION_ID"
              exec java -cp /app/weather-station-shaded.jar com.weather.station.WeatherStation
